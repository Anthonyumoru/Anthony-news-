--- layout: default --- <article class="post-single container"><span class="category">{{ page.category }}</span><h1>{{ page.title }}</h1><p class="meta">By {{ page.author }} • {{ page.date | date: "%B %d, %Y, %I:%M%p" }}</p>{% if page.image %}<img src="{{ site.baseurl }}{{ page.image }}" alt="{{ page.title }}" class="featured-img">{% endif %}<div class="post-content">{{ content }}</div></article>
