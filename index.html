---
layout: default
title: Home
---
<div class="ticker-wrap">
  <div id="price-ticker" class="ticker"><div class="ticker-item">Loading prices...</div></div>
</div>
<div class="container">
  <h1>Latest News</h1>
  <div class="post-grid">
    {% for post in site.posts limit:12 %}
    <article class="post-card">
      <span class="category">{{ post.category }}</span>
      <h2><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h2>
      <p class="meta">By {{ post.author }} • {{ post.date | date: "%B %d, %Y" }}</p>
      <p class="excerpt">{{ post.excerpt | strip_html | truncate: 160 }}</p>
    </article>
    {% endfor %}
  </div>
</div>
