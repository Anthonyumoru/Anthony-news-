backend:
  name: github
  repo: Anthonyumoru/Anthony-news-
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth
site_url: https://anthonyumoru.github.io/Anthony-news-
display_url: https://anthonyumoru.github.io/Anthony-news-
media_folder: assets/images
public_folder: /Anthony-news-/assets/images
collections:
    - name: posts
    label: Posts
    folder: _posts
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
            - {label: Title, name: title, widget: string}
            - {label: Author, name: author, widget: string, default: "Anthony Umoru"}
            - {label: Date, name: date, widget: datetime}
            - {label: Category, name: category, widget: select, options: ["News", "Nigeria", "World", "Business", "Tech"]}
            - {label: Body, name: body, widget: markdown}
